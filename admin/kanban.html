<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Be•Travel — Prospectos</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --teal:#0F3D3E;--teal-h:#0c3233;--teal-l:rgba(15,61,62,.07);--teal-m:rgba(15,61,62,.14);
  --beige:#E6E1D8;--beige-d:#D5CEC3;--bronze:#B08A5A;--dark:#2B2B2B;--white:#fff;
  --board:#e8e3da;--col-bg:#f1ede8;--red:#b83232;
  --shadow-s:0 1px 3px rgba(0,0,0,.10),0 1px 2px rgba(0,0,0,.06);
  --shadow-m:0 4px 12px rgba(0,0,0,.12),0 2px 4px rgba(0,0,0,.08);
  --shadow-l:0 10px 30px rgba(0,0,0,.16),0 4px 8px rgba(0,0,0,.08);
}
body{font-family:'Inter',sans-serif;background:var(--board);color:var(--dark);height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;overflow:hidden}

/* ── NAV ── */
.nav{background:var(--teal);height:50px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;z-index:300;box-shadow:0 2px 8px rgba(0,0,0,.2);gap:10px;flex-shrink:0}
.nav-left{display:flex;align-items:center;gap:12px;flex-shrink:0}
.nav-brand{font-size:15px;font-weight:600;color:var(--beige);letter-spacing:-.3px;white-space:nowrap}
.nav-brand span{color:var(--bronze)}
.nav-center{flex:1;display:flex;align-items:center;gap:8px;max-width:600px}
.search-wrap{flex:1;position:relative}
.search-input{width:100%;font-family:'Inter',sans-serif;font-size:12px;padding:6px 12px 6px 32px;border-radius:7px;border:1px solid rgba(230,225,216,.2);background:rgba(255,255,255,.1);color:var(--beige);outline:none;transition:all .18s}
.search-input::placeholder{color:rgba(230,225,216,.4)}
.search-input:focus{background:rgba(255,255,255,.18);border-color:rgba(230,225,216,.4)}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:rgba(230,225,216,.4);pointer-events:none}
.nav-right{display:flex;align-items:center;gap:7px;flex-shrink:0}
.sync-pill{display:flex;align-items:center;gap:5px;padding:4px 9px;border-radius:99px;background:rgba(0,0,0,.2);font-size:10px;color:rgba(230,225,216,.55)}
.sync-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;transition:background .4s}
.sync-dot.ok{background:#4ade80;box-shadow:0 0 6px #4ade8088}
.sync-dot.err{background:#f87171}
.sync-dot.loading{background:var(--bronze);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.nav-btn{font-family:'Inter',sans-serif;font-size:11px;font-weight:500;padding:6px 12px;border-radius:6px;border:1px solid rgba(230,225,216,.2);background:rgba(255,255,255,.08);color:rgba(230,225,216,.75);cursor:pointer;transition:all .18s;white-space:nowrap}
.nav-btn:hover{background:rgba(255,255,255,.16);color:var(--beige);border-color:rgba(230,225,216,.4)}
.nav-btn.accent{background:var(--bronze);color:#fff;border-color:var(--bronze)}
.nav-btn.accent:hover{background:#9a7648;border-color:#9a7648}
.nav-btn.active-filter{background:rgba(176,138,90,.3);border-color:var(--bronze);color:var(--beige)}

/* ── TOOLBAR (filtros) ── */
.toolbar{background:rgba(15,61,62,.95);backdrop-filter:blur(8px);height:0;overflow:hidden;transition:height .22s ease;display:flex;align-items:center;padding:0 16px;gap:10px;flex-wrap:nowrap;flex-shrink:0}
.toolbar.open{height:40px}
.tb-label{font-size:10px;font-weight:600;color:rgba(230,225,216,.45);letter-spacing:1.5px;text-transform:uppercase;white-space:nowrap}
.tb-chips{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.tb-chip{font-size:11px;font-weight:500;padding:3px 11px;border-radius:99px;border:1px solid rgba(230,225,216,.2);background:transparent;color:rgba(230,225,216,.55);cursor:pointer;transition:all .15s;white-space:nowrap}
.tb-chip:hover{border-color:rgba(230,225,216,.5);color:rgba(230,225,216,.9)}
.tb-chip.on{background:rgba(230,225,216,.15);border-color:rgba(230,225,216,.5);color:var(--beige)}
.tb-sep{width:1px;height:20px;background:rgba(230,225,216,.15)}
.view-btn{font-family:'Inter',sans-serif;font-size:11px;font-weight:500;padding:5px 10px;border-radius:5px;border:none;background:transparent;color:rgba(230,225,216,.55);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px;white-space:nowrap}
.view-btn:hover{background:rgba(255,255,255,.1);color:var(--beige)}
.view-btn.on{background:rgba(255,255,255,.18);color:var(--beige)}
.clear-filters{font-family:'Inter',sans-serif;font-size:10px;padding:3px 9px;border-radius:6px;border:1px solid rgba(176,138,90,.4);background:transparent;color:rgba(176,138,90,.8);cursor:pointer;transition:all .15s}
.clear-filters:hover{background:rgba(176,138,90,.1);color:var(--bronze)}

/* ── LOADING ── */
.loading-overlay{position:fixed;inset:0;background:rgba(15,61,62,.9);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:14px}
.loading-overlay.hidden{display:none}
.spinner{width:32px;height:32px;border-radius:50%;border:3px solid rgba(230,225,216,.15);border-top-color:var(--bronze);animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:12px;color:rgba(230,225,216,.5)}

/* ── VISTAS ── */
.main{flex:1;overflow:hidden;display:flex;flex-direction:column}

/* Vista Kanban */
.board-wrap{flex:1;overflow-x:auto;overflow-y:hidden;padding:14px 14px 20px;min-height:0}
.board-wrap::-webkit-scrollbar{height:6px}
.board-wrap::-webkit-scrollbar-thumb{background:rgba(15,61,62,.3);border-radius:3px}
.board{display:flex;gap:12px;align-items:flex-start;min-width:max-content;height:100%}

/* Vista Lista */
.list-wrap{flex:1;overflow-y:auto;padding:16px;min-height:0}
.list-wrap::-webkit-scrollbar{width:5px}
.list-wrap::-webkit-scrollbar-thumb{background:rgba(15,61,62,.25);border-radius:3px}
.list-table{width:100%;border-collapse:collapse;background:var(--white);border-radius:10px;overflow:hidden;box-shadow:var(--shadow-s)}
.list-table th{padding:10px 14px;text-align:left;font-size:10px;font-weight:600;color:rgba(43,43,43,.45);letter-spacing:1.2px;text-transform:uppercase;background:var(--beige);border-bottom:1px solid var(--beige-d)}
.list-table th.sortable{cursor:pointer;user-select:none}
.list-table th.sortable:hover{color:var(--teal)}
.list-table td{padding:10px 14px;font-size:12px;border-bottom:1px solid rgba(0,0,0,.05);vertical-align:middle}
.list-table tr:last-child td{border-bottom:none}
.list-table tr:hover td{background:rgba(15,61,62,.03);cursor:pointer}
.list-table tr.hidden-row{display:none}

/* Vista Resumen */
.summary-wrap{flex:1;overflow-y:auto;padding:16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;align-content:start;min-height:0}
.summary-card{background:var(--white);border-radius:10px;padding:18px 20px;box-shadow:var(--shadow-s)}
.summary-card h3{font-size:13px;font-weight:600;color:var(--teal);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.summary-card .accent-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.summary-bar{margin-bottom:8px}
.summary-bar-label{display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px;color:rgba(43,43,43,.65)}
.summary-bar-track{height:6px;background:var(--beige-d);border-radius:99px;overflow:hidden}
.summary-bar-fill{height:100%;border-radius:99px;transition:width .4s ease}
.summary-stat{font-size:28px;font-weight:600;color:var(--teal);line-height:1;margin-bottom:4px}
.summary-stat-label{font-size:11px;color:rgba(43,43,43,.45)}

/* ── COLUMNAS ── */
.col{width:272px;flex-shrink:0;background:var(--col-bg);border-radius:12px;display:flex;flex-direction:column;max-height:100%;box-shadow:var(--shadow-s);transition:box-shadow .2s}
.col.drag-target{box-shadow:0 0 0 2px var(--bronze),var(--shadow-m)}
.col-accent{height:4px;border-radius:12px 12px 0 0}
.col-header{padding:10px 12px 8px;display:flex;align-items:center;justify-content:space-between;gap:6px}
.col-title{font-size:13px;font-weight:600;color:var(--dark);flex:1}
.col-count{font-size:11px;font-weight:600;padding:2px 8px;border-radius:99px;background:rgba(0,0,0,.08);color:rgba(43,43,43,.6);min-width:24px;text-align:center}
.col-body{padding:6px 8px 8px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:7px}
.col-body::-webkit-scrollbar{width:4px}
.col-body::-webkit-scrollbar-thumb{background:rgba(0,0,0,.12);border-radius:2px}
.col-empty{padding:20px 12px;text-align:center;font-size:11px;color:rgba(43,43,43,.32);line-height:1.65}
.drop-ph{height:52px;border:2px dashed rgba(176,138,90,.35);border-radius:8px;display:none;align-items:center;justify-content:center;font-size:11px;color:rgba(176,138,90,.6);background:rgba(176,138,90,.04)}
.col.drag-target .drop-ph{display:flex}

/* ── CARDS ── */
.card{background:var(--white);border-radius:8px;padding:10px 12px;cursor:pointer;box-shadow:var(--shadow-s);transition:box-shadow .15s,transform .15s,opacity .2s;position:relative;border:1.5px solid transparent}
.card:hover{box-shadow:var(--shadow-m);transform:translateY(-1px)}
.card.active-card{border-color:var(--bronze);box-shadow:0 0 0 2px rgba(176,138,90,.2),var(--shadow-m)}
.card.dragging{opacity:.45;transform:rotate(2deg) scale(1.02);box-shadow:var(--shadow-l)}
.card.filtered-out{display:none}
.card::before{content:'';position:absolute;left:0;top:8px;bottom:8px;width:3px;border-radius:0 2px 2px 0;background:transparent}
.card-name{font-size:13px;font-weight:600;color:var(--dark);margin-bottom:3px;line-height:1.35;padding-right:22px}
.card-sub{font-size:11px;color:rgba(43,43,43,.5);margin-bottom:7px;line-height:1.4}
.card-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:5px}
.card-footer{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-top:4px}
.card-note-prev{font-size:10px;color:rgba(176,138,90,.8);font-style:italic;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-icons{display:flex;gap:5px;flex-shrink:0}
.ci{color:rgba(43,43,43,.3);display:flex;align-items:center}
.drag-handle{position:absolute;top:8px;right:8px;width:20px;height:20px;border-radius:4px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2.5px;cursor:grab;opacity:0;transition:opacity .15s}
.card:hover .drag-handle{opacity:1}
.drag-handle span{display:block;width:12px;height:1.5px;background:rgba(43,43,43,.3);border-radius:1px}

/* ── TAGS ── */
.tag{font-size:10px;font-weight:500;padding:2px 8px;border-radius:4px;white-space:nowrap;display:inline-flex;align-items:center;gap:3px}

/* ── PANEL ── */
.panel-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:400;opacity:0;pointer-events:none;transition:opacity .22s}
.panel-overlay.open{opacity:1;pointer-events:all}
.panel{position:fixed;top:0;right:-440px;bottom:0;width:420px;background:var(--white);z-index:500;box-shadow:-4px 0 24px rgba(0,0,0,.15);transition:right .25s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow:hidden}
.panel.open{right:0}
.panel-header{background:var(--teal);padding:16px 20px;flex-shrink:0}
.panel-title-row{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:4px}
.p-name-in{font-size:15px;font-weight:600;color:var(--beige);flex:1;outline:none;background:transparent;border:none;font-family:'Inter',sans-serif;border-bottom:1px solid transparent;transition:border-color .15s}
.p-name-in:focus{border-color:rgba(230,225,216,.4)}
.p-sub-in{font-size:11px;color:rgba(230,225,216,.55);background:transparent;border:none;border-bottom:1px solid transparent;outline:none;font-family:'Inter',sans-serif;width:100%;transition:all .15s;margin-top:4px}
.p-sub-in:focus{border-color:rgba(230,225,216,.3);color:rgba(230,225,216,.85)}
.p-sub-in::placeholder{color:rgba(230,225,216,.3)}
.panel-close{width:30px;height:30px;border-radius:6px;border:1px solid rgba(230,225,216,.2);background:transparent;cursor:pointer;font-size:16px;color:rgba(230,225,216,.6);display:flex;align-items:center;justify-content:center;transition:background .15s;flex-shrink:0}
.panel-close:hover{background:rgba(255,255,255,.12);color:var(--beige)}
.panel-body{flex:1;overflow-y:auto;padding:20px}
.panel-body::-webkit-scrollbar{width:4px}
.panel-body::-webkit-scrollbar-thumb{background:var(--beige-d);border-radius:2px}
.panel-footer{padding:14px 20px;border-top:1px solid var(--beige-d);flex-shrink:0;display:flex;flex-direction:column;gap:8px}
.psec{margin-bottom:20px}
.psec-title{font-size:10px;font-weight:600;color:rgba(43,43,43,.4);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.psec-title::after{content:'';flex:1;height:1px;background:var(--beige-d)}
.fi{width:100%;font-family:'Inter',sans-serif;font-size:13px;color:var(--dark);background:var(--beige);border:1.5px solid var(--beige-d);border-radius:8px;padding:9px 12px;outline:none;transition:border-color .15s,background .15s}
.fi:focus{border-color:var(--teal);background:var(--white)}
.fta{width:100%;font-family:'Inter',sans-serif;font-size:13px;color:var(--dark);background:var(--beige);border:1.5px solid var(--beige-d);border-radius:8px;padding:9px 12px;outline:none;resize:none;min-height:90px;line-height:1.6;transition:border-color .15s,background .15s}
.fta:focus{border-color:var(--teal);background:var(--white)}
.fl{display:block;font-size:11px;font-weight:500;color:rgba(43,43,43,.5);margin-bottom:5px}
.tag-group{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.tag-toggle{font-size:11px;font-weight:500;padding:4px 12px;border-radius:6px;cursor:pointer;transition:opacity .15s,transform .1s,box-shadow .15s;border:1.5px solid transparent;user-select:none}
.tag-toggle.off{opacity:.3}
.tag-toggle.on{opacity:1;box-shadow:0 2px 6px rgba(0,0,0,.12)}
.tag-toggle:hover{transform:translateY(-1px);opacity:.8}
.tag-toggle.on:hover{opacity:1}
.add-tag-btn{font-size:11px;font-weight:500;padding:4px 10px;border-radius:6px;border:1.5px dashed rgba(43,43,43,.2);background:transparent;color:rgba(43,43,43,.4);cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:4px}
.add-tag-btn:hover{border-color:var(--teal);color:var(--teal);background:var(--teal-l)}
.etapa-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.etapa-btn{font-family:'Inter',sans-serif;font-size:11px;font-weight:500;padding:8px 10px;border-radius:8px;border:1.5px solid var(--beige-d);background:var(--white);color:rgba(43,43,43,.6);cursor:pointer;text-align:left;line-height:1.25;transition:all .15s;display:flex;align-items:center;gap:6px}
.etapa-btn:hover{background:var(--beige);color:var(--dark);border-color:rgba(43,43,43,.2)}
.etapa-btn.on{background:var(--teal);color:var(--beige);border-color:var(--teal);box-shadow:0 2px 8px rgba(15,61,62,.25)}
.etapa-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.save-btn{width:100%;padding:11px;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;letter-spacing:.4px;background:var(--teal);color:var(--beige);border:none;border-radius:8px;cursor:pointer;transition:background .15s,box-shadow .15s;box-shadow:0 2px 8px rgba(15,61,62,.2)}
.save-btn:hover{background:var(--teal-h);box-shadow:0 4px 12px rgba(15,61,62,.3)}
.delete-btn{width:100%;padding:9px;font-family:'Inter',sans-serif;font-size:12px;font-weight:500;background:transparent;color:rgba(184,50,50,.7);border:1.5px solid rgba(184,50,50,.25);border-radius:8px;cursor:pointer;transition:all .15s}
.delete-btn:hover{background:rgba(184,50,50,.06);color:var(--red);border-color:rgba(184,50,50,.5)}
.save-ok{font-size:11px;color:#22c55e;text-align:center;height:16px;font-weight:500}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:600;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--white);border-radius:14px;padding:28px;width:100%;max-width:460px;box-shadow:var(--shadow-l);transform:translateY(10px);transition:transform .2s;max-height:90vh;overflow-y:auto}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-title{font-size:16px;font-weight:600;color:var(--teal);margin-bottom:5px}
.modal-sub{font-size:12px;color:rgba(43,43,43,.5);margin-bottom:20px;line-height:1.5}
.modal-field{margin-bottom:14px}
.modal-label{display:block;font-size:11px;font-weight:600;color:rgba(43,43,43,.5);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.modal-input{width:100%;font-family:'Inter',sans-serif;font-size:13px;color:var(--dark);background:var(--beige);border:1.5px solid var(--beige-d);border-radius:8px;padding:9px 12px;outline:none;transition:border-color .15s}
.modal-input:focus{border-color:var(--teal);background:var(--white)}
.modal-actions{display:flex;gap:8px;margin-top:20px}
.modal-btn{flex:1;padding:10px;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;border-radius:8px;cursor:pointer;border:1.5px solid transparent;transition:all .15s}
.modal-btn.primary{background:var(--teal);color:var(--beige);border-color:var(--teal)}
.modal-btn.primary:hover{background:var(--teal-h)}
.modal-btn.secondary{background:transparent;color:rgba(43,43,43,.6);border-color:var(--beige-d)}
.modal-btn.secondary:hover{background:var(--beige)}
.modal-btn.danger{background:transparent;color:var(--red);border-color:rgba(184,50,50,.3)}
.modal-btn.danger:hover{background:rgba(184,50,50,.06);border-color:var(--red)}

/* ── LOGIN SCREEN ── */
.login-screen{position:fixed;inset:0;background:var(--teal);display:flex;align-items:center;justify-content:center;z-index:1100;padding:20px}
.login-screen.hidden{display:none}
.login-box{background:var(--white);border-radius:16px;padding:40px 36px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.3);text-align:center}
.login-logo{font-size:22px;font-weight:600;color:var(--teal);letter-spacing:-.5px;margin-bottom:6px}
.login-logo span{color:var(--bronze)}
.login-subtitle{font-size:12px;color:rgba(43,43,43,.45);margin-bottom:32px}
.login-divider{font-size:10px;font-weight:600;color:rgba(43,43,43,.3);letter-spacing:1.5px;text-transform:uppercase;margin:20px 0;position:relative}
.login-divider::before,.login-divider::after{content:'';position:absolute;top:50%;width:40%;height:1px;background:var(--beige-d)}
.login-divider::before{left:0}.login-divider::after{right:0}
.google-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;padding:12px 16px;border-radius:9px;border:1.5px solid var(--beige-d);background:var(--white);font-family:'Inter',sans-serif;font-size:13px;font-weight:500;color:var(--dark);cursor:pointer;transition:all .18s;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.google-btn:hover{border-color:rgba(15,61,62,.3);background:var(--beige);box-shadow:0 3px 8px rgba(0,0,0,.1)}
.login-error{font-size:11px;color:var(--red);margin-top:14px;min-height:16px}

/* Color picker */
.color-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;margin-top:6px}
.cswatch{width:28px;height:28px;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:transform .15s,border-color .15s}
.cswatch:hover{transform:scale(1.18)}
.cswatch.sel{border-color:#1a1a1a;transform:scale(1.1)}

/* Tag management list */
.tag-list{display:flex;flex-direction:column;gap:6px;margin:8px 0}
.tag-list-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;background:var(--beige);border:1px solid var(--beige-d)}
.tli-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.tli-name{flex:1;font-size:12px;color:var(--dark)}
.tli-actions{display:flex;gap:4px}
.ticb{width:26px;height:26px;border-radius:6px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:rgba(43,43,43,.4);transition:all .15s}
.ticb:hover{background:rgba(0,0,0,.07);color:var(--dark)}
.ticb.del:hover{background:rgba(184,50,50,.08);color:var(--red)}

/* Sort indicator */
.sort-ind{font-size:10px;margin-left:3px;opacity:.5}

/* ── CONTACTOS MÚLTIPLES ── */
.contact-card{background:var(--beige);border:1px solid var(--beige-d);border-radius:8px;padding:10px 12px;margin-bottom:8px;position:relative}
.contact-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.contact-card-label{font-size:10px;font-weight:600;color:var(--teal);letter-spacing:.5px;text-transform:uppercase}
.contact-delete-btn{width:22px;height:22px;border-radius:4px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:rgba(43,43,43,.3);transition:all .15s;flex-shrink:0}
.contact-delete-btn:hover{background:rgba(184,50,50,.08);color:var(--red)}
.contact-fields{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.contact-field{display:flex;flex-direction:column;gap:3px}
.contact-field-label{font-size:10px;color:rgba(43,43,43,.45);font-weight:500}
.contact-field input{width:100%;font-family:'Inter',sans-serif;font-size:12px;color:var(--dark);background:var(--white);border:1px solid var(--beige-d);border-radius:5px;padding:6px 8px;outline:none;transition:border-color .15s}
.contact-field input:focus{border-color:var(--teal)}
.add-contact-btn{display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:7px;border:1.5px dashed var(--beige-d);background:transparent;color:rgba(43,43,43,.45);font-family:'Inter',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;width:100%;margin-top:2px}
.add-contact-btn:hover{border-color:var(--teal);color:var(--teal);background:var(--teal-l)}

/* ── MOBILE ── */
.hide-mobile{display:inline}
.show-mobile{display:none}
@media(max-width:640px){
  .hide-mobile{display:none!important}
  .show-mobile{display:flex!important}
  .nav{padding:0 10px;gap:6px}
  .nav-center{flex:1;min-width:0}
  .search-input{font-size:13px}
  .nav-right{gap:4px}
  .sync-pill{padding:4px 6px}
  .view-btn{padding:5px 7px}
  .nav-btn{padding:5px 8px}
  .toolbar.open{height:auto;padding:8px 12px;gap:8px;flex-wrap:wrap}
  .tb-label{display:none}
  .tb-sep{display:none}
  .toolbar.open{flex-direction:column;align-items:flex-start;gap:6px}
  .tb-chips{flex-wrap:wrap}

  /* En mobile el kanban muestra columna activa full width */
  .board-wrap{padding:10px 10px 16px}
  .board{gap:8px}
  .col{width:85vw;max-width:340px}

  /* Panel full screen en mobile */
  .panel{width:100%;right:-100%}
  .panel.open{right:0}
}

/* Mobile menu sheet */
.mobile-menu-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:600;opacity:0;pointer-events:none;transition:opacity .2s}
.mobile-menu-overlay.open{opacity:1;pointer-events:all}
.mobile-menu-sheet{position:fixed;bottom:-200px;left:0;right:0;background:var(--white);border-radius:16px 16px 0 0;padding:20px;z-index:700;transition:bottom .25s cubic-bezier(.4,0,.2,1);box-shadow:0 -4px 24px rgba(0,0,0,.15)}
.mobile-menu-sheet.open{bottom:0}
.mobile-menu-handle{width:36px;height:4px;background:var(--beige-d);border-radius:2px;margin:0 auto 16px}
.mobile-menu-item{display:flex;align-items:center;gap:12px;padding:13px 4px;border-bottom:1px solid var(--beige);cursor:pointer;font-size:14px;color:var(--dark);font-weight:500}
.mobile-menu-item:last-child{border-bottom:none;color:rgba(184,50,50,.8)}
.mobile-menu-item svg{flex-shrink:0;color:rgba(43,43,43,.5)}

let S        = {};   // prospectos: id -> {col, seg, pri, contacto, notas, name, sub}
let SEGS     = {};   // segmentos: id -> {id, label, color}
let PRIS     = {};   // prioridades: id -> {id, label, color}
let dragging = null;
let active   = null;
let saveT    = null;
let currentView  = 'kanban';
let filterSegs   = new Set();
let filterPris   = new Set();
let filterCols   = new Set();
let sortKey      = null;
let sortAsc      = true;
let boardBuilt   = false;
let segsLoaded   = false;
let prisLoaded   = false;
let prospectsLoaded = false;
let toolbarOpen  = false;
let nextId       = 61;

// ── FIREBASE LISTENERS ───────────────────────────────────────────────────────
function checkReady() {
  if (segsLoaded && prisLoaded && prospectsLoaded && !boardBuilt) {
    boardBuilt = true;
    buildAll();
    document.getElementById('lo').classList.add('hidden');
    setSyncStatus('ok','Sincronizado');
  }
}

SEGS_REF.on('value', snap => {
  const data = snap.val();
  if (data) {
    SEGS = data;
  } else {
    SEGS = {};
    DEFAULT_SEGS.forEach(s => { SEGS[s.id] = s; });
    SEGS_REF.set(SEGS);
  }
  segsLoaded = true;
  checkReady();
  if (boardBuilt) { rebuildFilterChips(); refreshAllCards(); refreshPanel(); }
});

PRIS_REF.on('value', snap => {
  const data = snap.val();
  if (data) {
    PRIS = data;
  } else {
    PRIS = {};
    DEFAULT_PRIS.forEach(p => { PRIS[p.id] = p; });
    PRIS_REF.set(PRIS);
  }
  prisLoaded = true;
  checkReady();
  if (boardBuilt) { rebuildFilterChips(); refreshAllCards(); refreshPanel(); }
});

PREF.on('value', snap => {
  const data = snap.val();
  const defaults = {};
  RAW_DEFAULT.forEach(p => { defaults[p.id] = p; });

  if (data) {
    S = {};
    // Primero cargar todos los defaults
    RAW_DEFAULT.forEach(p => { S[p.id] = {...p}; });
    // Luego aplicar encima solo los campos que Firebase tiene con valor real
    Object.keys(data).forEach(k => {
      const numId  = parseInt(k);
      const fromDB = data[k];
      if (!S[numId]) S[numId] = { ...fromDB };
      // Solo pisar campos que Firebase tiene con valor no-vacío
      const campos = ['col','seg','pri','contacto','notas'];
      campos.forEach(f => {
        if (fromDB[f] !== undefined && fromDB[f] !== null) S[numId][f] = fromDB[f];
      });
      // name y sub: solo pisar si Firebase los tiene con valor real
      if (fromDB.name && fromDB.name.trim() && fromDB.name !== 'undefined') S[numId].name = fromDB.name;
      if (fromDB.sub  && fromDB.sub.trim()  && fromDB.sub  !== 'undefined') S[numId].sub  = fromDB.sub;
    });
    // Escribir en Firebase los prospectos nuevos que no existan allá
    const dbKeys = new Set(Object.keys(data).map(Number));
    const newOnes = RAW_DEFAULT.filter(p => !dbKeys.has(p.id));
    if (newOnes.length > 0) {
      newOnes.forEach(p => { PREF.child(String(p.id)).set(p); });
    }
    nextId = Math.max(...Object.keys(S).map(Number), 60) + 1;
  } else {
    S = {};
    RAW_DEFAULT.forEach(p => { S[p.id] = {...p}; });
    PREF.set(S);
    nextId = 61;
  }
  prospectsLoaded = true;
  checkReady();
  if (boardBuilt) {
    syncBoard();
    renderListView();
    renderSummaryView();
    applyFilters();
    setSyncStatus('ok','Sincronizado');
  }
}, () => {
  setSyncStatus('err','Sin conexión');
  if (!boardBuilt) {
    S = {}; RAW_DEFAULT.forEach(p => { S[p.id] = {...p}; });
    SEGS = {}; DEFAULT_SEGS.forEach(s => { SEGS[s.id] = s; });
    PRIS = {}; DEFAULT_PRIS.forEach(p => { PRIS[p.id] = p; });
    buildAll(); document.getElementById('lo').classList.add('hidden');
  }
});

function setSyncStatus(status, label) {
  document.getElementById('sync-dot').className = 'sync-dot ' + status;
  document.getElementById('sync-label').textContent = label;
}
function persist(ref, val) {
  setSyncStatus('loading','Guardando…');
  ref.set(val).then(()=>setSyncStatus('ok','Sincronizado')).catch(()=>setSyncStatus('err','Error'));
}
function genId() { return 'custom_' + Date.now(); }

// ── CONTACTOS MÚLTIPLES ───────────────────────────────────────────────────────
// Estructura: p.contactos = [{nombre, cargo, email, linkedin}, ...]
// Retrocompatibilidad: si p.contacto (string viejo) existe, migrarlo

function migrateContacto(p) {
  if (!p.contactos) {
    p.contactos = [];
    if (p.contacto && p.contacto.trim()) {
      // Intentar separar "Nombre · Cargo" del string viejo
      const parts = p.contacto.split('·').map(s => s.trim());
      p.contactos.push({
        nombre:   parts[0] || '',
        cargo:    parts[1] || '',
        email:    '',
        linkedin: ''
      });
    }
    // Limpiar el campo viejo para que no vuelva a migrar
    p.contacto = '';
  }
  return p;
}

function renderContactos(contactos) {
  const list = document.getElementById('p-contactos-list');
  list.innerHTML = '';
  (contactos || []).forEach((c, i) => {
    list.appendChild(buildContactCard(c, i));
  });
}

function buildContactCard(c, i) {
  const div = document.createElement('div');
  div.className = 'contact-card';
  div.dataset.idx = i;
  div.innerHTML = `
    <div class="contact-card-header">
      <span class="contact-card-label">Contacto ${i + 1}</span>
      <button class="contact-delete-btn" onclick="removeContactRow(${i})" title="Eliminar contacto">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="contact-fields">
      <div class="contact-field">
        <span class="contact-field-label">Nombre</span>
        <input type="text" data-field="nombre" value="${escHtml(c.nombre||'')}" placeholder="Pablo Merzi">
      </div>
      <div class="contact-field">
        <span class="contact-field-label">Cargo</span>
        <input type="text" data-field="cargo" value="${escHtml(c.cargo||'')}" placeholder="Gerente de RRHH">
      </div>
      <div class="contact-field">
        <span class="contact-field-label">Email</span>
        <input type="email" data-field="email" value="${escHtml(c.email||'')}" placeholder="nombre@empresa.com">
      </div>
      <div class="contact-field">
        <span class="contact-field-label">LinkedIn</span>
        <input type="text" data-field="linkedin" value="${escHtml(c.linkedin||'')}" placeholder="linkedin.com/in/...">
      </div>
    </div>`;
  // Autoguardado al perder foco en cualquier campo del contacto
  div.querySelectorAll('input').forEach(inp => {
    inp.addEventListener('blur', () => autoSave());
    inp.addEventListener('change', () => autoSave());
  });
  return div;
}

function addContactRow() {
  if (!active) return;
  const p = S[active];
  migrateContacto(p);
  p.contactos.push({ nombre:'', cargo:'', email:'', linkedin:'' });
  renderContactos(p.contactos);
  const cards = document.querySelectorAll('#p-contactos-list .contact-card');
  const last = cards[cards.length - 1];
  if (last) last.querySelector('input').focus();
}

function removeContactRow(idx) {
  if (!active) return;
  const p = S[active];
  migrateContacto(p);
  p.contactos.splice(idx, 1);
  renderContactos(p.contactos);
  autoSave();
}

function readContactosFromPanel() {
  const cards = document.querySelectorAll('#p-contactos-list .contact-card');
  const result = [];
  cards.forEach(card => {
    const get = f => card.querySelector(`[data-field="${f}"]`)?.value?.trim() || '';
    const c = { nombre: get('nombre'), cargo: get('cargo'), email: get('email'), linkedin: get('linkedin') };
    if (c.nombre || c.cargo || c.email || c.linkedin) result.push(c);
  });
  return result;
}

function firstContactName(p) {
  if (p.contactos && p.contactos.length > 0) {
    const c = p.contactos[0];
    return [c.nombre, c.cargo].filter(Boolean).join(' · ');
  }
  return p.contacto || '';
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Autoguardado silencioso — sin mostrar "✓ Guardado", sin mover foco
function autoSave() {
  if (!active) return;
  const p = S[active];
  p.name     = document.getElementById('p-name').value.trim() || 'Sin nombre';
  p.sub      = document.getElementById('p-sub').value.trim();
  p.notas    = document.getElementById('p-notas').value;
  p.id       = active;
  p.contactos = readContactosFromPanel();
  p.contacto  = firstContactName(p);

  const segOn = document.querySelector('#p-seg .tag-toggle.on');
  const priOn = document.querySelector('#p-pri .tag-toggle.on');
  if (segOn) { const f = Object.values(SEGS).find(s=>s.label===segOn.textContent.trim()); if(f) p.seg=f.id; }
  if (priOn) { const f = Object.values(PRIS).find(pr=>pr.label===priOn.textContent.trim()); if(f) p.pri=f.id; }

  let card = document.getElementById('card'+active);
  if (card) updateCardDOM(card, p);

  persist(PREF.child(String(active)), p);
  renderListView(); renderSummaryView();
  updateStats(); applyFilters();
}

function tagBadge(tagObj, size='sm') {
  if (!tagObj) return '';
  const c = tagObj.color || '#94a3b8';
  const bg = hexAlpha(c, 0.15);
  const txt = hexAlpha(c, 0.9);
  return `<span class="tag" style="background:${bg};color:${txt};border:1px solid ${hexAlpha(c,0.3)}">${tagObj.label}</span>`;
}
function hexAlpha(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function getSegObj(k) { return SEGS[k]; }
function getPriObj(k) { return PRIS[k]; }
function getColObj(i) { return COLS[i] || COLS[0]; }

function priBarColor(k) {
  const p = PRIS[k];
  return p ? p.color : 'transparent';
}

// ── BUILD ALL ────────────────────────────────────────────────────────────────
function buildAll() {
  buildBoard();
  rebuildFilterChips();
  renderListView();
  renderSummaryView();
  // Autoguardado en campos principales del panel
  ['p-name','p-sub'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('blur', () => autoSave());
  });
  const notas = document.getElementById('p-notas');
  if (notas) notas.addEventListener('blur', () => autoSave());
}

// ── KANBAN BOARD ─────────────────────────────────────────────────────────────
function buildBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  COLS.forEach(c => {
    const col = document.createElement('div');
    col.className = 'col'; col.id = 'col'+c.id;
    col.innerHTML = `
      <div class="col-accent" style="background:${COL_COLORS[c.id]}"></div>
      <div class="col-header">
        <span class="col-title">${c.title}</span>
        <span class="col-count" id="cnt${c.id}">0</span>
      </div>
      <div class="col-body" id="b${c.id}">
        <div class="col-empty" id="dz${c.id}">Sin prospectos</div>
        <div class="drop-ph">Soltar acá</div>
      </div>`;
    col.addEventListener('dragover', e => { e.preventDefault(); col.classList.add('drag-target'); });
    col.addEventListener('dragleave', e => { if (!col.contains(e.relatedTarget)) col.classList.remove('drag-target'); });
    col.addEventListener('drop', e => {
      e.preventDefault(); col.classList.remove('drag-target');
      if (dragging === null) return;
      const body = document.getElementById('b'+c.id);
      const ph   = body.querySelector('.drop-ph');
      body.insertBefore(document.getElementById('card'+dragging), ph);
      S[dragging].col = c.id;
      persist(PREF.child(String(dragging)), S[dragging]);
      if (active === dragging) refreshEtapaPanel(c.id);
      dragging = null;
      updateStats(); applyFilters();
    });
    board.appendChild(col);
  });
  Object.values(S).forEach(p => {
    const body = document.getElementById('b'+(p.col||0));
    if (!body) return;
    const ph = body.querySelector('.drop-ph');
    body.insertBefore(makeCard(p), ph);
  });
  updateStats();
}

function makeCard(p) {
  const d = document.createElement('div');
  d.className = 'card'; d.id = 'card'+p.id;
  updateCardDOM(d, p);
  const handle = d.querySelector('.drag-handle');
  handle.addEventListener('mousedown', () => { d.draggable = true; });
  d.addEventListener('dragstart', () => { dragging = p.id; d.classList.add('dragging'); });
  d.addEventListener('dragend',   () => { d.classList.remove('dragging'); d.draggable = false; });
  d.addEventListener('click', e => { if (e.target.closest('.drag-handle')) return; openPanel(p.id); });
  return d;
}

function updateCardDOM(d, p) {
  const seg = getSegObj(p.seg);
  const pri = getPriObj(p.pri);
  const noteText = p.notas && p.notas.trim()
    ? p.notas.trim().split('\n')[0].substring(0,50)+(p.notas.length>50?'…':'') : '';

  // Border color por prioridad
  d.style.borderLeft = `3px solid ${priBarColor(p.pri)}`;

  // Si la card ya tiene los elementos internos, actualizarlos sin reemplazar innerHTML
  const nameEl = d.querySelector('.card-name');
  const subEl  = d.querySelector('.card-sub');
  const tagsEl = d.querySelector('.card-tags');
  const noteEl = d.querySelector('.card-note-prev');
  const iconsEl= d.querySelector('.card-icons');

  if (nameEl && subEl && tagsEl) {
    // Actualización quirúrgica — no toca el drag-handle ni rompe listeners
    nameEl.textContent = p.name || 'Sin nombre';
    subEl.textContent  = p.sub  || '';
    tagsEl.innerHTML   = tagBadge(seg) + tagBadge(pri);
    if (noteEl) {
      noteEl.textContent    = noteText;
      noteEl.style.display  = noteText ? 'block' : 'none';
    }
    if (iconsEl) {
      iconsEl.innerHTML = `
        ${(p.contactos?.length > 0 || p.contacto) ? `<span class="ci" title="Tiene contacto"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>` : ''}
        ${noteText    ? `<span class="ci" title="Tiene notas"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></span>` : ''}`;
    }
  } else {
    // Primera vez: construir estructura completa
    d.innerHTML = `
      <div class="drag-handle"><span></span><span></span><span></span></div>
      <div class="card-name">${p.name||'Sin nombre'}</div>
      <div class="card-sub">${p.sub||''}</div>
      <div class="card-tags">${tagBadge(seg)}${tagBadge(pri)}</div>
      <div class="card-footer">
        <div class="card-note-prev" style="display:${noteText?'block':'none'}">${noteText}</div>
        <div class="card-icons">
          ${p.contacto?`<span class="ci" title="Tiene contacto"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>`:''}
          ${noteText?`<span class="ci" title="Tiene notas"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></span>`:''}
        </div>
      </div>`;
    const nh = d.querySelector('.drag-handle');
    if (nh) nh.addEventListener('mousedown', () => { d.draggable = true; });
  }
}

function refreshAllCards() {
  Object.values(S).forEach(p => {
    const d = document.getElementById('card'+p.id);
    if (d) updateCardDOM(d, p);
  });
}

function syncBoard() {
  // Move cards to correct column, add new ones, remove deleted
  Object.values(S).forEach(p => {
    let d = document.getElementById('card'+p.id);
    if (!d) {
      d = makeCard(p);
    } else {
      updateCardDOM(d, p);
    }
    const body = document.getElementById('b'+(p.col||0));
    if (body && d.parentElement !== body) {
      const ph = body.querySelector('.drop-ph');
      body.insertBefore(d, ph);
    }
  });
  // Remove deleted
  document.querySelectorAll('.card').forEach(el => {
    const id = parseInt(el.id.replace('card',''));
    if (!S[id]) el.remove();
  });
  updateStats();
}

function updateStats() {
  COLS.forEach((c, i) => {
    const body = document.getElementById('b'+i);
    const cnt  = document.getElementById('cnt'+i);
    const dz   = document.getElementById('dz'+i);
    if (!body) return;
    // Contar solo cards no filtradas dentro de esta columna
    const visible = body.querySelectorAll('.card:not(.filtered-out)').length;
    const total   = body.querySelectorAll('.card').length;
    if (cnt) cnt.textContent = visible;
    if (dz)  dz.style.display = total > 0 ? 'none' : 'block';
  });
}

// ── FILTROS ──────────────────────────────────────────────────────────────────
function toggleToolbar() {
  toolbarOpen = !toolbarOpen;
  document.getElementById('toolbar').classList.toggle('open', toolbarOpen);
}

function rebuildFilterChips() {
  // Segmentos
  const tbSegs = document.getElementById('tb-segs');
  tbSegs.innerHTML = '';
  Object.values(SEGS).forEach(s => {
    const ch = document.createElement('button');
    ch.className = 'tb-chip' + (filterSegs.has(s.id) ? ' on' : '');
    ch.textContent = s.label;
    ch.dataset.id = s.id;
    ch.onclick = () => { toggleFilter(filterSegs, s.id); ch.classList.toggle('on'); applyFilters(); };
    tbSegs.appendChild(ch);
  });
  // Prioridades
  const tbPris = document.getElementById('tb-pris');
  tbPris.innerHTML = '';
  Object.values(PRIS).forEach(p => {
    const ch = document.createElement('button');
    ch.className = 'tb-chip' + (filterPris.has(p.id) ? ' on' : '');
    ch.textContent = p.label;
    ch.dataset.id = p.id;
    ch.onclick = () => { toggleFilter(filterPris, p.id); ch.classList.toggle('on'); applyFilters(); };
    tbPris.appendChild(ch);
  });
  // Etapas
  const tbCols = document.getElementById('tb-cols');
  tbCols.innerHTML = '';
  COLS.forEach(c => {
    const ch = document.createElement('button');
    ch.className = 'tb-chip' + (filterCols.has(c.id) ? ' on' : '');
    ch.textContent = c.title;
    ch.dataset.id = c.id;
    ch.onclick = () => { toggleFilter(filterCols, c.id); ch.classList.toggle('on'); applyFilters(); };
    tbCols.appendChild(ch);
  });
}

function toggleFilter(set, val) {
  if (set.has(val)) set.delete(val); else set.add(val);
}

function clearFilters() {
  filterSegs.clear(); filterPris.clear(); filterCols.clear();
  document.getElementById('search-input').value = '';
  document.querySelectorAll('.tb-chip').forEach(c => c.classList.remove('on'));
  applyFilters();
}

function applyFilters() {
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  const hasSegF = filterSegs.size > 0;
  const hasPriF = filterPris.size > 0;
  const hasColF = filterCols.size > 0;

  Object.values(S).forEach(p => {
    const matches =
      (!q || p.name.toLowerCase().includes(q) || (p.sub||'').toLowerCase().includes(q) || (p.contacto||'').toLowerCase().includes(q) || (p.contactos||[]).some(c=>(c.nombre+c.cargo+c.email+c.linkedin).toLowerCase().includes(q))) &&
      (!hasSegF || filterSegs.has(p.seg)) &&
      (!hasPriF || filterPris.has(p.pri)) &&
      (!hasColF || filterCols.has(p.col));

    const card = document.getElementById('card'+p.id);
    if (card) card.classList.toggle('filtered-out', !matches);

    const row = document.getElementById('row'+p.id);
    if (row) row.classList.toggle('hidden-row', !matches);
  });
  updateStats();
}

// ── VISTAS ───────────────────────────────────────────────────────────────────
function setView(v) {
  currentView = v;
  document.getElementById('view-kanban').style.display  = v==='kanban'  ? '' : 'none';
  document.getElementById('view-list').style.display    = v==='list'    ? '' : 'none';
  document.getElementById('view-summary').style.display = v==='summary' ? '' : 'none';
  ['kanban','list','summary'].forEach(id => {
    document.getElementById('vb-'+id).classList.toggle('on', v===id);
  });
  if (v==='list')    renderListView();
  if (v==='summary') renderSummaryView();
  applyFilters();
}

// ── VISTA LISTA ───────────────────────────────────────────────────────────────
function renderListView() {
  const tbody = document.getElementById('list-body');
  tbody.innerHTML = '';
  const items = Object.values(S);
  if (sortKey) {
    items.sort((a,b) => {
      let va = a[sortKey]||'', vb = b[sortKey]||'';
      if (sortKey==='col') { va = va||0; vb = vb||0; }
      if (va < vb) return sortAsc ? -1 : 1;
      if (va > vb) return sortAsc ?  1 : -1;
      return 0;
    });
  }
  items.forEach(p => {
    const tr = document.createElement('tr');
    tr.id = 'row'+p.id;
    const seg = getSegObj(p.seg);
    const pri = getPriObj(p.pri);
    const col = COLS[p.col||0];
    tr.innerHTML = `
      <td><span style="font-weight:600;color:var(--dark)">${p.name}</span><br><span style="font-size:10px;color:rgba(43,43,43,.45)">${p.sub||''}</span></td>
      <td>${tagBadge(seg)}</td>
      <td>${tagBadge(pri)}</td>
      <td><span style="display:inline-flex;align-items:center;gap:5px;font-size:11px;color:rgba(43,43,43,.65)"><span style="width:8px;height:8px;border-radius:50%;background:${COL_COLORS[p.col||0]};flex-shrink:0;display:inline-block"></span>${col.title}</span></td>
      <td style="font-size:11px;color:rgba(43,43,43,.6);max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${firstContactName(p)||'—'}</td>
      <td style="font-size:11px;color:rgba(43,43,43,.5);font-style:italic;max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.notas||'—'}</td>`;
    tr.addEventListener('click', () => openPanel(p.id));
    tbody.appendChild(tr);
  });
  applyFilters();
}

function sortList(key) {
  if (sortKey === key) { sortAsc = !sortAsc; }
  else { sortKey = key; sortAsc = true; }
  ['name','seg','pri','col'].forEach(k => {
    document.getElementById('si-'+k).textContent = k===key ? (sortAsc?'↑':'↓') : '';
  });
  renderListView();
}

// ── VISTA RESUMEN ─────────────────────────────────────────────────────────────
function renderSummaryView() {
  const wrap = document.getElementById('view-summary');
  wrap.innerHTML = '';
  const all = Object.values(S);
  const total = all.length;

  // Card total
  const tc = mk('div','summary-card');
  tc.innerHTML = `<h3><span class="accent-dot" style="background:var(--teal)"></span>Total de prospectos</h3><div class="summary-stat">${total}</div><div class="summary-stat-label">en el pipeline</div>`;
  wrap.appendChild(tc);

  // Por etapa
  const ec = mk('div','summary-card');
  let html = `<h3><span class="accent-dot" style="background:#60a5fa"></span>Por etapa</h3>`;
  COLS.forEach((c,i) => {
    const n = all.filter(p=>p.col===i).length;
    const pct = total ? Math.round(n/total*100) : 0;
    html += `<div class="summary-bar"><div class="summary-bar-label"><span>${c.title}</span><span>${n}</span></div><div class="summary-bar-track"><div class="summary-bar-fill" style="width:${pct}%;background:${COL_COLORS[i]}"></div></div></div>`;
  });
  ec.innerHTML = html; wrap.appendChild(ec);

  // Por segmento
  const sc = mk('div','summary-card');
  let shtml = `<h3><span class="accent-dot" style="background:#8b5cf6"></span>Por segmento</h3>`;
  Object.values(SEGS).forEach(s => {
    const n = all.filter(p=>p.seg===s.id).length;
    const pct = total ? Math.round(n/total*100) : 0;
    shtml += `<div class="summary-bar"><div class="summary-bar-label"><span>${s.label}</span><span>${n}</span></div><div class="summary-bar-track"><div class="summary-bar-fill" style="width:${pct}%;background:${s.color}"></div></div></div>`;
  });
  sc.innerHTML = shtml; wrap.appendChild(sc);

  // Por prioridad
  const pc = mk('div','summary-card');
  let phtml = `<h3><span class="accent-dot" style="background:#f59e0b"></span>Por prioridad</h3>`;
  Object.values(PRIS).forEach(p => {
    const n = all.filter(x=>x.pri===p.id).length;
    const pct = total ? Math.round(n/total*100) : 0;
    phtml += `<div class="summary-bar"><div class="summary-bar-label"><span>${p.label}</span><span>${n}</span></div><div class="summary-bar-track"><div class="summary-bar-fill" style="width:${pct}%;background:${p.color}"></div></div></div>`;
  });
  pc.innerHTML = phtml; wrap.appendChild(pc);

  // Con contacto
  const cc = mk('div','summary-card');
  const withContact = all.filter(p=>(p.contactos?.length > 0) || (p.contacto && p.contacto.trim())).length;
  const withNotes   = all.filter(p=>p.notas&&p.notas.trim()).length;
  cc.innerHTML = `<h3><span class="accent-dot" style="background:#22c55e"></span>Completitud</h3>
    <div class="summary-bar"><div class="summary-bar-label"><span>Con contacto</span><span>${withContact}/${total}</span></div><div class="summary-bar-track"><div class="summary-bar-fill" style="width:${total?Math.round(withContact/total*100):0}%;background:#22c55e"></div></div></div>
    <div class="summary-bar"><div class="summary-bar-label"><span>Con notas</span><span>${withNotes}/${total}</span></div><div class="summary-bar-track"><div class="summary-bar-fill" style="width:${total?Math.round(withNotes/total*100):0}%;background:#14b8a6"></div></div></div>`;
  wrap.appendChild(cc);
}

function mk(tag, cls) { const e = document.createElement(tag); e.className = cls; return e; }

// ── PANEL ────────────────────────────────────────────────────────────────────
function openPanel(id) {
  if (active) { const prev=document.getElementById('card'+active); if(prev) prev.classList.remove('active-card'); }
  active = id;
  const isNew = !S[id];
  if (!isNew) { const el=document.getElementById('card'+id); if(el) el.classList.add('active-card'); }
  refreshPanel();
  document.getElementById('p-ok').textContent='';
  document.getElementById('delete-btn').style.display = isNew ? 'none' : '';
  document.getElementById('panel').classList.add('open');
  document.getElementById('panel-overlay').classList.add('open');
}

function openNewCard() {
  const newId = nextId++;
  S[newId] = { id: newId, name:'', sub:'', col:0, seg: Object.keys(SEGS)[0]||'s', pri: Object.keys(PRIS)[0]||'hi', contacto:'', notas:'' };
  active = newId;
  refreshPanel();
  document.getElementById('p-ok').textContent='';
  document.getElementById('delete-btn').style.display = 'none';
  document.getElementById('panel').classList.add('open');
  document.getElementById('panel-overlay').classList.add('open');
  setTimeout(() => document.getElementById('p-name').focus(), 300);
}

function refreshPanel() {
  if (!active) return;
  const p = S[active];
  if (!p) return;

  document.getElementById('p-name').value    = p.name || '';
  document.getElementById('p-sub').value     = p.sub  || '';
  document.getElementById('p-notas').value   = p.notas    || '';

  // Contactos estructurados
  migrateContacto(p);
  renderContactos(p.contactos);

  refreshEtapaPanel(p.col || 0);

  // Segmentos
  const segEl = document.getElementById('p-seg');
  segEl.innerHTML = '';
  Object.values(SEGS).forEach(s => {
    const t = document.createElement('span');
    const isOn = p.seg === s.id;
    t.className = 'tag tag-toggle ' + (isOn?'on':'off');
    const bg = hexAlpha(s.color, isOn ? 0.18 : 0.08);
    const tx = hexAlpha(s.color, isOn ? 1 : 0.5);
    t.style.cssText = `background:${bg};color:${tx};border:1.5px solid ${hexAlpha(s.color, isOn?0.4:0.15)}`;
    t.textContent = s.label;
    t.onclick = () => {
      p.seg = s.id;
      segEl.querySelectorAll('.tag-toggle').forEach(b => b.classList.replace('on','off'));
      t.classList.replace('off','on');
      autoSave();
    };
    segEl.appendChild(t);
  });
  const manBtn1 = document.createElement('button');
  manBtn1.className='add-tag-btn'; manBtn1.textContent='+ Gestionar';
  manBtn1.onclick = () => openManageTags('seg');
  segEl.appendChild(manBtn1);

  // Prioridades
  const priEl = document.getElementById('p-pri');
  priEl.innerHTML = '';
  Object.values(PRIS).forEach(pr => {
    const t = document.createElement('span');
    const isOn = p.pri === pr.id;
    t.className = 'tag tag-toggle ' + (isOn?'on':'off');
    const bg = hexAlpha(pr.color, isOn ? 0.18 : 0.08);
    const tx = hexAlpha(pr.color, isOn ? 1 : 0.5);
    t.style.cssText = `background:${bg};color:${tx};border:1.5px solid ${hexAlpha(pr.color, isOn?0.4:0.15)}`;
    t.textContent = pr.label;
    t.onclick = () => {
      p.pri = pr.id;
      priEl.querySelectorAll('.tag-toggle').forEach(b => b.classList.replace('on','off'));
      t.classList.replace('off','on');
      autoSave();
    };
    priEl.appendChild(t);
  });
  const manBtn2 = document.createElement('button');
  manBtn2.className='add-tag-btn'; manBtn2.textContent='+ Gestionar';
  manBtn2.onclick = () => openManageTags('pri');
  priEl.appendChild(manBtn2);
}

function refreshEtapaPanel(currentCol) {
  const etEl = document.getElementById('p-etapa');
  etEl.innerHTML = '';
  COLS.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'etapa-btn' + (currentCol===c.id?' on':'');
    btn.innerHTML = `<span class="etapa-dot" style="background:${COL_COLORS[c.id]}"></span>${c.title}`;
    btn.onclick = () => {
      if (!S[active]) return;
      // Mover card a la nueva columna
      const oldCol = S[active].col;
      S[active].col = c.id;
      etEl.querySelectorAll('.etapa-btn').forEach((b,i) => { b.className='etapa-btn'+(i===c.id?' on':''); });
      // Mover la card en el DOM
      const card = document.getElementById('card'+active);
      if (card) {
        const newBody = document.getElementById('b'+c.id);
        const ph = newBody.querySelector('.drop-ph');
        newBody.insertBefore(card, ph);
      }
      autoSave();
      updateStats();
    };
    etEl.appendChild(btn);
  });
}

function closePanel() {
  if (active) { const el=document.getElementById('card'+active); if(el) el.classList.remove('active-card'); active=null; }
  document.getElementById('panel').classList.remove('open');
  document.getElementById('panel-overlay').classList.remove('open');
}

function savePanel() {
  if (!active) return;
  const p = S[active];
  p.name     = document.getElementById('p-name').value.trim() || 'Sin nombre';
  p.sub      = document.getElementById('p-sub').value.trim();
  p.notas    = document.getElementById('p-notas').value;
  p.id       = active;

  // Leer contactos estructurados
  p.contactos = readContactosFromPanel();
  // Mantener retrocompatibilidad: contacto string = primer contacto resumido
  p.contacto  = firstContactName(p);

  // Leer seg y pri desde los toggles activos del panel
  const segOn = document.querySelector('#p-seg .tag-toggle.on');
  const priOn = document.querySelector('#p-pri .tag-toggle.on');
  if (segOn) {
    const label = segOn.textContent.trim();
    const found = Object.values(SEGS).find(s => s.label === label);
    if (found) p.seg = found.id;
  }
  if (priOn) {
    const label = priOn.textContent.trim();
    const found = Object.values(PRIS).find(pr => pr.label === label);
    if (found) p.pri = found.id;
  }

  // Actualizar card en el board
  let card = document.getElementById('card'+active);
  if (!card) {
    card = makeCard(p);
    const body = document.getElementById('b'+(p.col||0));
    const ph   = body.querySelector('.drop-ph');
    body.insertBefore(card, ph);
  } else {
    updateCardDOM(card, p);
    const handle = card.querySelector('.drag-handle');
    if (handle) handle.addEventListener('mousedown', () => { card.draggable = true; });
    card.ondragstart = null;
    card.addEventListener('dragstart', () => { dragging = p.id; card.classList.add('dragging'); });
    card.addEventListener('dragend',   () => { card.classList.remove('dragging'); card.draggable = false; });
    card.onclick = (e) => { if (e.target.closest('.drag-handle')) return; openPanel(p.id); };
  }

  persist(PREF.child(String(active)), p);
  renderListView(); renderSummaryView();
  updateStats(); applyFilters();

  const ok = document.getElementById('p-ok');
  ok.textContent = '✓ Guardado';
  clearTimeout(saveT);
  saveT = setTimeout(()=>{ ok.textContent=''; }, 2500);
}

function deleteCard() {
  if (!active) return;
  if (!confirm(`¿Eliminar "${S[active]?.name || 'este prospecto'}"? Esta acción no se puede deshacer.`)) return;
  const card = document.getElementById('card'+active);
  if (card) card.remove();
  const row = document.getElementById('row'+active);
  if (row) row.remove();
  PREF.child(String(active)).remove();
  delete S[active];
  active = null;
  closePanel();
  updateStats(); renderSummaryView();
}

// ── GESTIÓN DE SEGMENTOS Y PRIORIDADES ──────────────────────────────────────
function openManageTags(type) {
  const isSegs = type === 'seg';
  const ref    = isSegs ? SEGS_REF : PRIS_REF;
  const data   = isSegs ? SEGS : PRIS;
  const title  = isSegs ? 'Gestionar segmentos' : 'Gestionar prioridades';
  const sub    = isSegs ? 'Creá, editá o eliminá segmentos. Los cambios se aplican a todas las tarjetas.' : 'Creá, editá o eliminá prioridades. Los cambios se aplican a todas las tarjetas.';

  function render() {
    document.getElementById('modal-box').innerHTML = `
      <div class="modal-title">${title}</div>
      <div class="modal-sub">${sub}</div>
      <div class="tag-list" id="tl">
        ${Object.values(data).map(t => `
          <div class="tag-list-item" id="tli-${t.id}">
            <div class="tli-dot" style="background:${t.color};border-radius:3px"></div>
            <div class="tli-name">${t.label}</div>
            <div class="tli-actions">
              <button class="ticb" onclick="editTag('${type}','${t.id}')" title="Editar">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              </button>
              <button class="ticb del" onclick="deleteTag('${type}','${t.id}')" title="Eliminar">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
              </button>
            </div>
          </div>`).join('')}
      </div>
      <div class="modal-actions">
        <button class="modal-btn secondary" onclick="closeModal()">Cerrar</button>
        <button class="modal-btn primary" onclick="addTag('${type}')">+ Nuevo</button>
      </div>`;
  }
  render();
  document.getElementById('modal').classList.add('open');
}

function addTag(type) {
  const isSegs = type === 'seg';
  const ref    = isSegs ? SEGS_REF : PRIS_REF;
  let selColor = SWATCHES[Math.floor(Math.random()*SWATCHES.length)];

  document.getElementById('modal-box').innerHTML = `
    <div class="modal-title">${isSegs?'Nuevo segmento':'Nueva prioridad'}</div>
    <div class="modal-sub">Completá los datos y guardá.</div>
    <div class="modal-field">
      <label class="modal-label">Nombre</label>
      <input class="modal-input" id="nt-name" placeholder="${isSegs?'Ej: Gobierno':'Ej: Urgente'}" autofocus>
    </div>
    <div class="modal-field">
      <label class="modal-label">Color</label>
      <div class="color-grid" id="cg">
        ${SWATCHES.map(c=>`<div class="cswatch${c===selColor?' sel':''}" style="background:${c}" data-color="${c}" onclick="pickColor(this,'nt')"></div>`).join('')}
      </div>
    </div>
    <div class="modal-actions">
      <button class="modal-btn secondary" onclick="openManageTags('${type}')">Volver</button>
      <button class="modal-btn primary" onclick="saveNewTag('${type}')">Guardar</button>
    </div>`;
}

function saveNewTag(type) {
  const name = document.getElementById('nt-name').value.trim();
  if (!name) { document.getElementById('nt-name').focus(); return; }
  const color = document.querySelector('#cg .sel')?.dataset.color || '#94a3b8';
  const id    = genId();
  const obj   = { id, label: name, color };
  if (type==='seg') { SEGS[id] = obj; persist(SEGS_REF, SEGS); }
  else               { PRIS[id] = obj; persist(PRIS_REF, PRIS); }
  rebuildFilterChips();
  openManageTags(type);
}

function editTag(type, tagId) {
  const isSegs = type === 'seg';
  const data   = isSegs ? SEGS : PRIS;
  const t      = data[tagId];
  if (!t) return;

  document.getElementById('modal-box').innerHTML = `
    <div class="modal-title">Editar ${isSegs?'segmento':'prioridad'}</div>
    <div class="modal-sub">Los cambios se verán en todas las tarjetas que usan este tag.</div>
    <div class="modal-field">
      <label class="modal-label">Nombre</label>
      <input class="modal-input" id="et-name" value="${t.label}">
    </div>
    <div class="modal-field">
      <label class="modal-label">Color</label>
      <div class="color-grid" id="cg">
        ${SWATCHES.map(c=>`<div class="cswatch${c===t.color?' sel':''}" style="background:${c}" data-color="${c}" onclick="pickColor(this,'et')"></div>`).join('')}
      </div>
    </div>
    <div class="modal-actions">
      <button class="modal-btn secondary" onclick="openManageTags('${type}')">Volver</button>
      <button class="modal-btn primary" onclick="saveEditTag('${type}','${tagId}')">Guardar</button>
    </div>`;
}

function saveEditTag(type, tagId) {
  const name  = document.getElementById('et-name').value.trim();
  if (!name) return;
  const color = document.querySelector('#cg .sel')?.dataset.color || '#94a3b8';
  const ref   = type==='seg' ? SEGS_REF : PRIS_REF;
  const data  = type==='seg' ? SEGS : PRIS;
  data[tagId] = { ...data[tagId], label: name, color };
  persist(ref, data);
  refreshAllCards(); refreshPanel(); rebuildFilterChips();
  openManageTags(type);
}

function deleteTag(type, tagId) {
  const data = type==='seg' ? SEGS : PRIS;
  const t    = data[tagId];
  if (!t) return;
  if (!confirm(`¿Eliminar "${t.label}"? Las tarjetas que lo usan quedarán sin ${type==='seg'?'segmento':'prioridad'}.`)) return;
  const ref = type==='seg' ? SEGS_REF : PRIS_REF;
  delete data[tagId];
  persist(ref, data);
  rebuildFilterChips(); refreshAllCards(); refreshPanel();
  openManageTags(type);
}

function pickColor(el, prefix) {
  document.querySelectorAll('#cg .cswatch').forEach(s => s.classList.remove('sel'));
  el.classList.add('sel');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

// ── TOUCH DRAG (mobile) ───────────────────────────────────────────────────────
(function() {
  let touchCard   = null;
  let touchClone  = null;
  let touchId     = null;
  let lastTarget  = null;
  let startScrollLeft = 0;
  let startTouchX = 0;

  function getCardId(el) {
    const card = el.closest('.card');
    if (!card) return null;
    return parseInt(card.id.replace('card',''));
  }

  function getColBelow(x, y) {
    const els = document.elementsFromPoint(x, y);
    for (const el of els) {
      if (el.classList.contains('col-body')) return el;
      if (el.classList.contains('col')) return el.querySelector('.col-body');
    }
    return null;
  }

  document.addEventListener('touchstart', e => {
    const target = e.target.closest('.card');
    if (!target) return;
    // Only initiate if touch is on the card (not a button inside)
    if (e.target.closest('button')) return;

    touchId = getCardId(target);
    if (!touchId) return;

    const t = e.touches[0];
    startTouchX = t.clientX;

    // Long press to start drag
    const longPressTimer = setTimeout(() => {
      touchCard = target;
      const rect = target.getBoundingClientRect();

      // Create clone
      touchClone = target.cloneNode(true);
      touchClone.style.cssText = `
        position:fixed;left:${rect.left}px;top:${rect.top}px;
        width:${rect.width}px;opacity:.85;z-index:9999;
        pointer-events:none;transform:scale(1.04) rotate(1.5deg);
        box-shadow:0 12px 32px rgba(0,0,0,.2);transition:transform .1s;
        border:1.5px solid var(--bronze);`;
      document.body.appendChild(touchClone);

      target.style.opacity = '0.3';
      target.draggable = true;

      // Vibrate if supported
      if (navigator.vibrate) navigator.vibrate(30);
    }, 350);

    target._lpt = longPressTimer;

    target.addEventListener('touchend', () => {
      clearTimeout(target._lpt);
    }, {once: true});

    target.addEventListener('touchmove', (me) => {
      const dx = Math.abs(me.touches[0].clientX - startTouchX);
      if (dx > 8) clearTimeout(target._lpt);
    }, {once: true});

  }, {passive: true});

  document.addEventListener('touchmove', e => {
    if (!touchClone || !touchCard) return;
    e.preventDefault();

    const t = e.touches[0];
    const rect = touchCard.getBoundingClientRect();
    const cloneW = parseInt(touchClone.style.width);
    touchClone.style.left = (t.clientX - cloneW / 2) + 'px';
    touchClone.style.top  = (t.clientY - 30) + 'px';

    // Highlight target column
    const colBody = getColBelow(t.clientX, t.clientY);
    if (colBody && colBody !== lastTarget) {
      if (lastTarget) lastTarget.closest('.col')?.classList.remove('drag-target');
      colBody.closest('.col')?.classList.add('drag-target');
      lastTarget = colBody;
    }

    // Auto-scroll board horizontally
    const boardWrap = document.querySelector('.board-wrap');
    const bRect = boardWrap.getBoundingClientRect();
    if (t.clientX > bRect.right - 60) boardWrap.scrollLeft += 8;
    if (t.clientX < bRect.left  + 60) boardWrap.scrollLeft -= 8;

  }, {passive: false});

  document.addEventListener('touchend', e => {
    if (!touchClone || !touchCard || !touchId) {
      // Reset
      touchCard = null; touchClone = null; touchId = null; lastTarget = null;
      return;
    }

    const t = e.changedTouches[0];
    const colBody = getColBelow(t.clientX, t.clientY);

    if (colBody) {
      const colId = parseInt(colBody.id.replace('b',''));
      if (!isNaN(colId)) {
        const ph = colBody.querySelector('.drop-ph');
        colBody.insertBefore(touchCard, ph);
        if (S[touchId]) {
          S[touchId].col = colId;
          persist(PREF.child(String(touchId)), S[touchId]);
          if (active === touchId) refreshEtapaPanel(colId);
        }
        updateStats(); applyFilters();
      }
    }

    // Cleanup
    touchCard.style.opacity = '';
    touchCard.draggable = false;
    if (touchClone) { touchClone.remove(); touchClone = null; }
    if (lastTarget) { lastTarget.closest('.col')?.classList.remove('drag-target'); lastTarget = null; }
    touchCard = null; touchId = null;

  }, {passive: true});
})();

</script>
</body>
</html>
